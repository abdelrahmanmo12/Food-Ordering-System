server:
  port: 8080 

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/auth/**
          filters:
            - AuthenticationFilter #

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/