server:
  port: 8080

spring:
  cloud:
    gateway:
      routes:

        # 1️⃣ AUTH (برا السيكيوريتي)
        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/auth/**

        - id: restaurant-admin
          uri: lb://RESTAURANT-SERVICE
          predicates:
            - Path=/restaurants/request,/restaurants/**
          filters:
            - AuthenticationFilter

        - id: restaurant-public
          uri: lb://RESTAURANT-SERVICE
          predicates:
            - Path=/restaurants
            - Method=GET

        - id: menu-public
          uri: lb://RESTAURANT-SERVICE
          predicates:
            - Path=/menu/**
            - Method=GET

        - id: restaurant-private
          uri: lb://RESTAURANT-SERVICE
          predicates:
            - Path=/restaurants/**
            - Method=POST,PUT,DELETE,PATCH
          filters:
            - AuthenticationFilter

        - id: menu-private
          uri: lb://RESTAURANT-SERVICE
          predicates:
            - Path=/menu/**
            - Method=POST,PUT,DELETE,PATCH
          filters:
            - AuthenticationFilter

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

